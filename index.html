<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copilot Studio Community</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0078D7" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      flex-direction: column;
    }

    .btn {
      padding: 16px 32px;
      font-size: 1.2em;
      background: #0078D7;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 10px;
    }

    .hint {
      margin-top: 15px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>

<body>

  <a
    class="btn"
    href="https://techcommunity.microsoft.com/group/copilot-studio-community-hub"
    target="_blank"
    rel="noopener noreferrer"
  >
    Open Copilot Studio Community
  </a>

  <div class="hint">
    If it doesn’t open, tap again — network may be busy.
  </div>

</body>
</html>
